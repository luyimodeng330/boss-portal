<title>Boss Portal · 总裁每日工作看板</title>
<style>
  :root {

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {

    line-height: 1.6;
    min-height: 100vh;
    max-width: 100vw;
    overflow-x: hidden;
  }

  /* Header */
  .header {
    background: var(--wine);
    color: var(--beige);
    padding: 16px 20px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }
  .header-title {

    font-weight: 700;

  .header-subtitle {
    font-size: 13px;

  }
  .header-actions {

    gap: 8px;
  }
  .btn-refresh {
    background: var(--wine-light);

    display: flex;
    align-items: center;
    gap: 8px;

  .status-banner .tag {
    background: var(--red-alert);
    color: var(--white);
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 600;
  }

  /* Cards */
  .card-section {
    margin: 12px 16px;
    background: var(--white);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    overflow: hidden;

  .card-header {
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 8px;
    border-bottom: 1px solid var(--beige-dark);

  .card-header .icon { font-size: 18px; }

  .weather-icon { min-width: 20px; font-size: 16px; }

  /* Briefing Section */

  .insight-header {

  .insight-tab {

  .insight-tab.active {

// ====== UTILS ======
function laoNow() {
  const now = new Date();
  const utc = now.getTime() + now.getTimezoneOffset() * 60000;
  return new Date(utc + 7 * 3600000);
}

function formatDate(d) {
  const weekdays = ['周日','周一','周二','周三','周四','周五','周六'];
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')} ${weekdays[d.getDay()]}`;
}

function formatTime(h, m) {
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
}

function saveLocal(key, val) {
  try { localStorage.setItem(key, JSON.stringify(val)); } catch(e) {}
}

function loadLocal(key) {
  try { return JSON.parse(localStorage.getItem(key)); } catch(e) { return null; }
}

// ====== DATE DISPLAY ======
function updateDateDisplay() {
  const now = laoNow();
  document.getElementById('dateSubtitle').textContent = formatDate(now);
  const todayKey = `${now.getFullYear()}-${now.getMonth()}-${now.getDate()}`;
  const savedDay = loadLocal('ops_day');
  if (savedDay !== todayKey) {
    // notes feature removed
    saveLocal('ops_day', todayKey);
  }
}

// ====== SCHEDULE ======
function renderSchedule() {
  const now = laoNow();
  const currentMinutes = now.getHours() * 60 + now.getMinutes();
  const listEl = document.getElementById('scheduleList');
  const freeEl = document.getElementById('freeTimeBlock');
  const countEl = document.getElementById('scheduleCount');

  countEl.textContent = `${scheduleData.length}场`;

  let doneCount = 0;
  let html = '';
  scheduleData.forEach((item, i) => {
    const isDone = loadLocal(`ops_done_${i}`) || false;
    if (isDone) doneCount++;
    const startMin = item.startH * 60 + item.startM;
    const endMin = item.endH * 60 + item.endM;
    const hasInsight = item.insightKey && INSIGHT_DATA[item.insightKey];
    const clickClass = hasInsight ? 'clickable' : '';
    const clickFn = hasInsight ? `onclick="openInsight('${item.insightKey}')"` : '';

    html += `
    <div class="schedule-item ${isDone ? 'done' : ''} ${clickClass}" data-index="${i}" ${clickFn}>
      <div class="time-col">
        <div class="time-start">${formatTime(item.startH, item.startM)}</div>
        <div class="time-end">${formatTime(item.endH, item.endM)}</div>
      </div>
      <div class="item-content">
        <div class="item-title">${item.title}${hasInsight ? ' 🔍' : ''}</div>
        <div class="item-location">${item.location || ''}</div>
        <div class="item-tags">
          ${item.tags ? item.tags.map(t => `<span class="item-tag ${t.type}">${t.label}</span>`).join('') : ''}
        </div>
      </div>
      <div class="item-actions">
        <button class="btn-icon ${isDone ? 'active' : ''}" onclick="event.stopPropagation();toggleDone(${i})" title="标记完成">✓</button>
      </div>
    </div>`;
  });

  listEl.innerHTML = html;

  let freeSlots = [];
  let sorted = scheduleData.sort((a,b) => (a.startH*60+a.startM) - (b.startH*60+b.startM));
  let lastEnd = 8 * 60;
  sorted.forEach(item => {
    const start = item.startH * 60 + item.startM;
    if (start > lastEnd + 30) {
      freeSlots.push({ start: lastEnd, end: start });
    }
    lastEnd = item.endH * 60 + item.endM;
  });
  if (lastEnd < 20 * 60) freeSlots.push({ start: lastEnd, end: 20*60 });

  if (freeSlots.length > 0) {
    freeEl.innerHTML = '🟢 空闲时段: ' + freeSlots.map(s =>
      `${formatTime(Math.floor(s.start/60), s.start%60)}-${formatTime(Math.floor(s.end/60), s.end%60)}`
    ).join(' · ');
    freeEl.style.display = '';
  } else {
    freeEl.style.display = 'none';
  }

  const totalMin = 12 * 60;
  const elapsed = Math.min(currentMinutes - 8*60, totalMin);
  const pct = Math.max(0, Math.round((elapsed / totalMin) * 100));
  document.getElementById('progressBar').style.width = pct + '%';
}

function toggleDone(idx) {
  const current = loadLocal(`ops_done_${idx}`) || false;
  saveLocal(`ops_done_${idx}`, !current);
  renderSchedule();
}

function toggleCard(cardId) {
  const body = document.querySelector(`#${cardId} .card-body`);
  const toggle = document.querySelector(`#${cardId} .toggle`);
  if (body.classList.contains('collapsed')) {
    body.classList.remove('collapsed');
    toggle.textContent = '▼';
  } else {
    body.classList.add('collapsed');
    toggle.textContent = '▶';
  }
}

// ====== INSIGHT PANEL ======
function openInsight(key) {
  if (!INSIGHT_DATA[key]) return;
  currentInsightKey = key;
  currentTab = 'negotiation';
  const data = INSIGHT_DATA[key];
  const name = data.negotiation ? data.negotiation.overview.company_name : key;
  document.getElementById('insightTitle').textContent = name + ' · 谈判作战包';
  document.getElementById('insightOverlay').classList.add('show');
  // Reset tabs
  document.querySelectorAll('.insight-tab').forEach(t => t.classList.remove('active'));
  document.querySelector('.insight-tab[data-tab="negotiation"]').classList.add('active');
  renderInsightContent();
}

function closeInsight(e) {
  if (e && e.target !== document.getElementById('insightOverlay')) return;
  document.getElementById('insightOverlay').classList.remove('show');
  currentInsightKey = '';
}

function switchTab(tab, btn) {
  currentTab = tab;
  document.querySelectorAll('.insight-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  // Update title
  const data = INSIGHT_DATA[currentInsightKey];
  const name = data.negotiation ? data.negotiation.overview.company_name : currentInsightKey;
  const titles = { negotiation: '谈判作战包', investment: '行业投资逻辑', battleplan: '今日作战计划' };
  document.getElementById('insightTitle').textContent = name + ' · ' + titles[tab];
  renderInsightContent();
}

// ====== RENDER INSIGHT CONTENT ======
function renderInsightContent() {
  const data = INSIGHT_DATA[currentInsightKey];
  if (!data) return;
  const el = document.getElementById('insightContent');

  if (currentTab === 'negotiation') {
    renderNegotiationTab(data, el);
  } else if (currentTab === 'investment') {
    renderInvestmentTab(data, el);
  } else if (currentTab === 'battleplan') {
    renderBattleplanTab(data, el);
  }
}

  // 板块8: 谈判策略建议
  html += renderSection(8, '谈判策略建议', renderStrategy(n.strategy));

  html += '<div class="layer-sep">── 第三层：风险兜底 ──</div>';

  html += renderSection('9a', '合规风险检查', renderCompliance(n.compliance));

  html += `<div class="insight-card" style="background:var(--green-bg);"><span class="highlight">我方匹配度：</span>${needs.our_match || '待补充'}</div>`;
  return html;
}

function renderChips(chips) {
  if (!chips) return '<div class="insight-card">数据待补充</div>';
  let html = '';
  if (chips.items && chips.items.length > 0) {
    chips.items.forEach(c => {
      const levelClass = c.value_level === '高' ? 'high' : c.value_level === '中高' ? 'mid-high' : c.value_level === '极高' ? 'high' : 'mid';
      html += `<div class="chip-card">
      <div class="chip-cat"><span class="chip-icon">${c.icon || '📋'}</span>${c.category}<span class="chip-level ${levelClass}">${c.value_level}</span></div>
      <div class="chip-detail">${c.detail}</div>
      <div class="chip-basis">法律依据: ${c.legal_basis || '通用'}</div>
      ${c.exclusivity ? `<div class="chip-exclusive">独有性: ${c.exclusivity}</div>` : ''}
    </div>`;
    });
  }

  if (chips.tradeable && chips.tradeable.length > 0) {
    html += '<div class="sub-heading">可谈判筹码</div>';
    html += '<ul class="insight-list">';
    chips.tradeable.forEach(t => {
      html += `<li><span class="bullet" style="background:var(--green-ok)"></span><span class="val">${t}</span></li>`;
    });
    html += '</ul>';
  }

  if (chips.non_tradeable && chips.non_tradeable.length > 0) {
    html += '<div class="sub-heading">不可谈判红线</div>';
    html += '<ul class="insight-list">';
    chips.non_tradeable.forEach(t => {
      html += `<li><span class="bullet" style="background:var(--red-alert)"></span><span class="val">${t}</span></li>`;
    });
    html += '</ul>';
  }
  return html;
}

function renderCompetition(comp) {
  if (!comp) return '<div class="insight-card">数据待补充</div>';
  let html = '';

  if (comp.competitors && comp.competitors.length > 0) {
    html += '<table class="cmp-table"><thead><tr><th>竞争者</th><th>优势</th><th>劣势</th><th>条件</th><th>特色</th></tr></thead><tbody>';
    comp.competitors.forEach(c => {
      html += `<tr>
      <td>${c.region || c.name || ''}</td>
      <td>${c.fishery_advantages ? c.fishery_advantages.join('; ') : c.pros || '待补充'}</td>
      <td>${c.fishery_disadvantages ? c.fishery_disadvantages.join('; ') : c.cons || '待补充'}</td>
      <td>${c.investment_conditions || '待补充'}</td>
      <td>${c.fishery_specific || '待补充'}</td>
    </tr>`;
    });
    html += '</tbody></table>';
  }

  html += `<div class="insight-card"><span class="key-num">我方优势：</span>${comp.our_advantage || '待补充'}</div>`;
  html += `<div class="insight-card"><span class="highlight">我方劣势：</span>${comp.our_disadvantage || '待补充'}</div>`;
  html += `<div class="insight-card" style="background:var(--green-bg);border-left:3px solid var(--green-ok);"><span class="highlight">定位策略：</span>${comp.positioning || '待补充'}</div>`;
  return html;
}

function renderStrategy(strat) {
  if (!strat) return '<div class="insight-card">数据待补充</div>';
  let html = '';

  const keys = ['strategy_a', 'strategy_b', 'strategy_c'];
  const labels = ['A', 'B', 'C'];
  keys.forEach((k, i) => {
    const s = strat[k];
    const isRec = strat.recommended === k;
    html += `<div class="strategy-card ${isRec ? 'recommended' : ''}">
      <div class="strat-name">方案${labels[i]}：${s.name}${isRec ? '<span class="rec-badge">推荐</span>' : ''}</div>
      <div class="strat-row"><span class="strat-label">核心交换</span><span class="strat-val">${s.core_trade}</span></div>
      <div class="strat-row"><span class="strat-label">预期反应</span><span class="strat-val">${s.expected_reaction}</span></div>
      <div class="strat-row"><span class="strat-label">底线</span><span class="strat-val">${s.bottom_line}</span></div>
      <div class="strat-row"><span class="strat-label">适用场景</span><span class="strat-val">${s.best_for}</span></div>
    </div>`;
  });

  html += `<div class="rec-banner">
    <div class="rec-title">推荐方案理由</div>
    <div class="rec-text">${strat.reason || '待补充'}</div>
  </div>`;
  return html;
}

function renderCompliance(comp) {
  if (!comp) return '<div class="insight-card">数据待补充</div>';
  let html = '';
  const keys = Object.keys(comp);
  if (keys.length === 0) return '<div class="insight-card">合规数据待补充</div>';
  keys.forEach(k => {
    const c = comp[k];
    if (!c || !c.item) return;
    html += `<div class="compliance-card">
      <div class="comp-title"><span class="comp-icon">⚠️</span>${c.item}</div>
      <div class="comp-row"><span class="comp-label">要求</span><span class="comp-val">${c.requirement}</span></div>
      <div class="comp-row"><span class="comp-label">风险</span><span class="comp-risk">${c.risk}</span></div>
      <div class="comp-action">应对: ${c.action}</div>
    </div>`;
  });
  return html;
}

function renderFeasibility(feas) {
  if (!feas) return '<div class="insight-card">数据待补充</div>';
  let html = '';
  // Handle two formats: IHC (keyed objects) or 华为/中能建 (items array)
  if (feas.items && Array.isArray(feas.items)) {
    feas.items.forEach(f => {
      if (!f) return;
      const levelClass = f.feasibility === '高' ? 'high' : f.feasibility === '中高' ? 'mid-high' : f.feasibility === '中' ? 'mid' : f.feasibility === '中低' ? 'mid-low' : 'mid';
      html += `<div class="feasibility-card ${levelClass}">
        <div class="feas-name">${f.project || '待补充'}<span class="feas-badge">可行性: ${f.feasibility || '待评估'}</span></div>
        ${f.reason ? `<div class="feas-row"><span class="feas-label">分析</span><span class="feas-val">${f.reason}</span></div>` : ''}
        ${f.timeline ? `<div class="feas-row"><span class="feas-label">时间线</span><span class="feas-val">${f.timeline}</span></div>` : ''}
      </div>`;
    });
  } else {
    const keys = Object.keys(feas);
    keys.forEach(k => {
      const f = feas[k];
      if (!f || !f.name) return;
      const levelClass = f.feasibility_level === '高' ? 'high' : f.feasibility_level === '中' ? 'mid' : f.feasibility_level === '中低' ? 'mid-low' : 'mid';
      html += `<div class="feasibility-card ${levelClass}">
        <div class="feas-name">${f.name}<span class="feas-badge">可行性: ${f.feasibility_level}</span></div>
        <div class="feas-row"><span class="feas-label">投资规模</span><span class="feas-val">${f.investment_scale || '待补充'}</span></div>
        <div class="feas-row"><span class="feas-label">回本周期</span><span class="feas-val">${f.payback_period || '待补充'}</span></div>
        <div class="feas-row"><span class="feas-label">市场数据</span><span class="feas-val">${f.market_data || '待补充'}</span></div>
        <div class="feas-row"><span class="feas-label">关键依赖</span><span class="feas-val">${f.key_dependencies ? f.key_dependencies.join('; ') : '待补充'}</span></div>
        <div class="feas-row"><span class="feas-label">最大风险</span><span class="feas-val" style="color:var(--red-alert)">${f.biggest_risk || '待补充'}</span></div>
        ${f.price_advantage ? `<div class="feas-row"><span class="feas-label">价格优势</span><span class="feas-val">${f.price_advantage}</span></div>` : ''}
        ${f.alternative ? `<div class="feas-row"><span class="feas-label">替代方案</span><span class="feas-val">${f.alternative}</span></div>` : ''}
        ${f.strategic_opportunity ? `<div class="feas-row"><span class="feas-label">战略机遇</span><span class="feas-val" style="color:var(--green-ok)">${f.strategic_opportunity}</span></div>` : ''}
      </div>`;
    });
  }
  if (!html) html = '<div class="insight-card">数据待补充</div>';
  return html;
}

// ====== Tab2: 行业投资逻辑 ======
function renderInvestmentTab(data, el) {
  const inv = data.investment;
  if (!inv) { el.innerHTML = '<div class="insight-card">数据待补充</div>'; return; }

  let html = '';

  // 板块1: 行业规模与增长
  html += renderSection(1, '行业规模与增长', renderMarketSize(inv.marketSize));

  // 板块2: 政策风向
  html += renderSection(2, '政策风向', renderPolicy(inv.policy));

  // 板块3: 投资回报基准
  html += renderSection(3, '投资回报基准', renderROIBenchmarks(inv.roiBenchmarks));

  // 板块4: 对标案例
  html += renderSection(4, '对标案例', renderBenchmarkCases(inv.benchmarkCases));

  // 板块5: 行业风险
  html += renderSection(5, '行业风险', renderRisks(inv.risks));

  // 板块6: 投资逻辑总结
  html += renderSection(6, '投资逻辑总结', renderLogicSummary(inv.logicSummary));

  el.innerHTML = html;
}

      <div class="ind-name">${m.name}</div>
      <div class="ind-row"><span class="ind-label">市场规模</span><span class="ind-val">${m.market_size}</span></div>
      <div class="ind-row"><span class="ind-label">增长率</span><span class="ind-val">${m.growth_rate}</span></div>
      ${m.export_trend ? `<div class="ind-row"><span class="ind-label">出口趋势</span><span class="ind-val">${m.export_trend}</span></div>` : ''}
      ${m.trend ? `<div class="ind-row"><span class="ind-label">趋势</span><span class="ind-val">${m.trend}</span></div>` : ''}
      <div class="ind-row"><span class="ind-label">核心驱动</span><span class="ind-val">${m.key_driver}</span></div>
    </div>`;

}

function renderPolicy(pol) {
  let html = '';
  const keys = Object.keys(pol);
  keys.forEach(k => {
    const p = pol[k];
    if (!p || !p.title) return;
    html += `<div class="policy-card">
      <div class="pol-title">${p.title}</div>
      <div class="pol-row"><span class="pol-label">支持</span><span class="pol-support">${p.support}</span></div>
      <div class="pol-row"><span class="pol-label">限制</span><span class="pol-restrict">${p.restriction}</span></div>
      ${p.special_zone ? `<div class="pol-row"><span class="pol-label">特区</span><span class="pol-zone">${p.special_zone}</span></div>` : ''}
      ${p.opportunity ? `<div class="pol-row"><span class="pol-label">机遇</span><span class="pol-opportunity">${p.opportunity}</span></div>` : ''}
    </div>`;
  });
  return html;
}

function renderROIBenchmarks(benchmarks) {
  let html = '';
  benchmarks.forEach(b => {
    html += `<div class="roi-card">
      <div class="roi-name">${b.industry}</div>
      <div class="roi-row"><span class="roi-label">典型ROI</span><span class="roi-val" style="color:var(--green-ok);font-weight:700">${b.typical_roi}</span></div>
      <div class="roi-row"><span class="roi-label">回本周期</span><span class="roi-val" style="font-weight:700">${b.payback}</span></div>
      ${b.reference_revenue ? `<div class="roi-row"><span class="roi-label">参考营收</span><span class="roi-val">${b.reference_revenue}</span></div>` : ''}

      <div class="roi-row"><span class="roi-label">成功要素</span><span class="roi-val">${b.key_success_factor}</span></div>
      ${b.reference_case ? `<div class="roi-row"><span class="roi-label">对标案例</span><span class="roi-val">${b.reference_case}</span></div>` : ''}
    </div>`;
  });
  return html;
}

function renderBenchmarkCases(cases) {
  let html = '';
  cases.forEach(c => {
    html += `<div class="case-card">
      <div class="case-name">${c.case}</div>
      <div class="case-row"><span class="case-label">规模</span><span class="case-val">${c.scale}</span></div>
      <div class="case-row"><span class="case-label">启示</span><span class="case-val">${c.lesson}</span></div>
      <div class="case-row"><span class="case-label">对我们的意义</span><span class="case-val" style="color:var(--wine);font-weight:500">${c.implication}</span></div>
    </div>`;
  });
  return html;
}

function renderRisks(risks) {
  let html = '';
  const riskCategories = [
    { key: 'fishery_risks', title: '渔业风险', icon: '🐟' },
    { key: 'automotive_risks', title: '汽车风险', icon: '🚗' },
    { key: 'computing_risks', title: '算力风险', icon: '💻' },
    { key: 'media_risks', title: '媒体风险', icon: '📰' }
  ];
  riskCategories.forEach(rc => {
    if (!risks[rc.key] || risks[rc.key].length === 0) return;
    html += `<div class="sub-heading">${rc.icon} ${rc.title}</div>`;
    html += '<ul class="risk-list">';
    risks[rc.key].forEach(r => {
      html += `<li><span class="risk-icon">⚠️</span>${r}</li>`;
    });
    html += '</ul>';
  });
  return html;
}

function renderLogicSummary(logic) {
  let html = '';
  const logicItems = [
    { key: 'fishery_logic', title: '渔业投资逻辑' },
    { key: 'automotive_logic', title: '汽车投资逻辑' },
    { key: 'computing_logic', title: '算力投资逻辑' },
    { key: 'media_logic', title: '媒体投资逻辑' }
  ];
  logicItems.forEach(li => {
    if (!logic[li.key]) return;
    html += `<div class="logic-card">
      <div class="logic-name">${li.title}</div>
      <div class="logic-text">${logic[li.key]}</div>
    </div>`;
  });

  if (logic.priority_recommendation) {
    html += `<div class="rec-banner">
      <div class="rec-title">优先级推荐</div>
      <div class="rec-text">${logic.priority_recommendation}</div>
    </div>`;
  }

  if (logic.packaging_strategy) {
    html += `<div class="insight-card" style="background:var(--blue-bg);border-left:3px solid var(--blue-plan);">
      <span class="key-num">打包策略：</span>${logic.packaging_strategy}
    </div>`;
  }
  return html;
}

// ====== Tab3: 今日作战计划 ======
function renderBattleplanTab(data, el) {
  const bp = data.battleplan;
  if (!bp) { el.innerHTML = '<div class="insight-card">数据待补充</div>'; return; }

  let html = '';

  // 板块1: 会议基本信息
  html += renderSection(1, '会议基本信息', renderMeeting(bp.meeting));

  // 板块2: 开场策略
  html += renderSection(2, '开场策略', renderOpening(bp.opening));

  // 板块3: 核心议题排序
  html += renderSection(3, '核心议题排序', renderAgendaPriority(bp.agendaPriority));

  // 板块4: 交换条件清单
  html += renderSection(4, '交换条件清单', renderTradeItems(bp.tradeItems));

  // 板块5: 对方可能反应+应对
  html += renderSection(5, '对方可能反应+应对', renderScenarios(bp.scenarios));

  // 板块6: 底线清单
  html += renderSection(6, '底线清单', renderBottomLines(bp.bottomLines));

  // 板块7: 收尾路径
  html += renderSection(7, '收尾路径', renderClosing(bp.closing));

  el.innerHTML = html;
}

function renderMeeting(mtg) {
  let html = `<div class="meeting-card">
    <div class="mtg-row"><span class="mtg-label">时间</span><span class="mtg-val">${mtg.time || '待确认'}</span></div>
    <div class="mtg-row"><span class="mtg-label">地点</span><span class="mtg-val">${mtg.location || '待确认'}</span></div>
    <div class="mtg-row"><span class="mtg-label">对方</span><span class="mtg-val">${mtg.counterparty || '待确认'}</span></div>
    ${mtg.counterparty_attendees ? `<div class="mtg-row"><span class="mtg-label">对方参会</span><span class="mtg-val">${mtg.counterparty_attendees}</span></div>` : ''}
    ${mtg.our_attendees ? `<div class="mtg-row"><span class="mtg-label">我方参会</span><span class="mtg-val">${mtg.our_attendees}</span></div>` : ''}
    <div class="mtg-row"><span class="mtg-label">会议类型</span><span class="mtg-val">${mtg.meeting_type || '待确认'}</span></div>
  </div>`;
  if (mtg.agenda_items && mtg.agenda_items.length > 0) {
    html += '<div class="sub-heading">议题</div>';
    html += '<ul class="insight-list">';
    mtg.agenda_items.forEach(a => {
      html += `<li><span class="bullet" style="background:var(--blue-plan)"></span><span class="val">${a}</span></li>`;
    });

  }

}

function renderOpening(op) {
  let html = `<div class="opening-card">
    <div class="op-row"><span class="op-label">切入策略</span><span class="op-val">${op.approach}</span></div>
    <div class="op-row"><span class="op-label">策略逻辑</span><span class="op-val">${op.rationale}</span></div>
    <div class="op-row"><span class="op-label">语气基调</span><span class="op-val">${op.tone}</span></div>
    <div class="sub-heading">开场话术</div>
    <div class="op-script">${op.script}</div>

function renderAgendaPriority(agenda) {
  let html = '';
  agenda.forEach(a => {
    const rankClass = `rank${a.rank}`;
    html += `<div class="agenda-card ${rankClass}">
      <div class="ag-topic"><span class="ag-rank">${a.rank}</span>${a.topic}</div>
      <div class="ag-row"><span class="ag-label">理由</span><span class="ag-val">${a.reason}</span></div>
      <div class="ag-row"><span class="ag-label">我方目标</span><span class="ag-val">${a.our_goal}</span></div>
      <div class="ag-row"><span class="ag-label">核心数据</span><span class="ag-val">${a.key_data}</span></div>
      <div class="ag-row"><span class="ag-label">核心论点</span><span class="ag-val" style="font-weight:600;color:var(--wine)">${a.key_argument}</span></div>

  });

function renderTradeItems(items) {
  let html = '';
  items.forEach(t => {
    const priClass = t.priority.includes('高') ? 'high' : t.priority.includes('中高') ? 'mid-high' : t.priority.includes('中') ? 'mid' : 'low';
    html += `<div class="trade-item">
      <span class="trade-priority ${priClass}">${t.priority}</span>
      <div class="trade-row"><span class="trade-label">我们给</span><span class="trade-val">${t.we_give}</span></div>
      <div class="trade-row"><span class="trade-label">我们换</span><span class="trade-val">${t.we_want}</span></div>
      <div class="trade-data">数据支撑: ${t.data_support}</div>
    </div>`;
  });
  return html;
}

function renderScenarios(scenarios) {
  let html = '';
  scenarios.forEach((s, i) => {
    html += `<div class="scenario-card">
      <div class="sc-title"><span class="sc-num">${i+1}</span>${s.title} <span style="font-size:11px;color:var(--warm-gray)">${s.likelihood}</span></div>
      <div class="sc-row"><span class="sc-label">应对</span><span class="sc-val">${s.response}</span></div>
      <div class="sc-bl">底线: ${s.bottom_line}</div>
    </div>`;
  });
  return html;
}

function renderBottomLines(bl) {
  let html = '';

  html += '<div class="sub-heading">硬底线（不可逾越）</div>';
  html += '<div style="margin-bottom:8px;">';
  bl.hard.forEach(h => {
    html += `<span class="bl-tag hard">${h}</span>`;
  });
  html += '</div>';

  html += '<div class="sub-heading">软底线（可谈判但有最低要求）</div>';
  html += '<div style="margin-bottom:8px;">';
  bl.soft.forEach(s => {
    html += `<span class="bl-tag soft">${s}</span>`;
  });
  html += '</div>';

  html += '<div class="sub-heading">离场条件（遇到就终止谈判）</div>';
  html += '<div>';
  bl.walk_away.forEach(w => {
    html += `<span class="bl-tag walk">${w}</span>`;
  });
  html += '</div>';

  return html;
}

function renderClosing(closing) {
  let html = '';

  html += `<div class="close-card best">
    <div class="close-label">最好结果</div>
    ${closing.best_case}
  </div>`;

  html += `<div class="close-card likely">
    <div class="close-label">最可能结果</div>
    ${closing.likely_case}
  </div>`;

  html += `<div class="close-card worst">
    <div class="close-label">最差结果</div>
    ${closing.worst_case}
  </div>`;

  html += `<div class="insight-card" style="background:var(--blue-bg);border-left:3px solid var(--blue-plan);">
    <span class="key-num">会后跟进：</span>${closing.follow_up}
  </div>`;

  if (closing.deliverables && closing.deliverables.length > 0) {
    html += '<div class="sub-heading">会后交付物</div>';
    html += '<ul class="deliverable-list">';
    closing.deliverables.forEach(d => {
      html += `<li><span class="dl-icon">📄</span>${d}</li>`;
    });
    html += '</ul>';
  }

  return html;
}
